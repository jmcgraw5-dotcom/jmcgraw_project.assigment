<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Phoenix Bikers Club">
    <title>Phoenix Bikers Club - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo-area">
        <img src="logo.png" alt="Phoenix Bikers Club Logo" class="logo-img">
        <h1>Phoenix Bikers Club</h1>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="groups.html">Groups/Clubs</a></li>
            <li><a href="calendar.html">Calendar</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>
</header>

<main class="content-section">
    <div class="info-box">
        <h2>Contact Us</h2>
        <p>Have questions? Reach out using the form below.</p>

        <form action="#" method="post">
            <label>Name:</label>
            <input type="text" required>

            <label>Email:</label>
            <input type="email" required>

            <label>Reason for Contact:</label>
            <select required>
                <option>General Question</option>
                <option>Join a Group</option>
                <option>Event Inquiry</option>
            </select>

            <label>Message:</label>
            <textarea required></textarea>

            <button type="submit">Submit</button>
        </form>

        <p>Email us directly at  
            <a href="mailto:info@phoenixbikersclub.com" class="accent-link">info@phoenixbikersclub.com</a>
        </p>
    </div>
</main>

<footer>
    <p>phoenixbikersclub.com | © 2026 Phoenix Bikers Club | Social Links</p>
</footer>

</body>
</html>
